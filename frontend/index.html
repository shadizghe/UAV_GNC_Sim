<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>3D Waypoint Editor</title>
<style>
  :root {
    --bg: #0a0e1a;
    --panel: #141a2e;
    --cyan: #00d4ff;
    --amber: #ffc107;
    --pink: #ff4081;
    --muted: #8aa0b8;
    --text: #e1e8f0;
  }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: Inter, "Segoe UI", Helvetica, Arial, sans-serif;
    overflow: hidden;
  }
  #wrap { position: relative; width: 100%; height: 100vh; }
  canvas { display: block; outline: none; }

  .hud {
    position: absolute; pointer-events: none;
    background: rgba(20, 26, 46, 0.88);
    border: 1px solid rgba(0, 212, 255, 0.22);
    color: var(--text);
    font-size: 12px; line-height: 1.45;
    padding: 8px 12px; border-radius: 8px;
    backdrop-filter: blur(4px);
  }
  #hint   { top: 10px; left: 12px; max-width: 320px; }
  #status { top: 10px; right: 12px; color: var(--cyan); }
  #status b { color: var(--amber); }
  #axes {
    bottom: 10px; left: 12px; pointer-events: none;
    font-size: 11px; color: var(--muted);
  }
  #axes span.x { color: #ff7676; }
  #axes span.y { color: #7dff7d; }
  #axes span.z { color: #7dbdff; }

  .bar {
    position: absolute; bottom: 10px; right: 12px;
    display: flex; gap: 6px; pointer-events: auto;
  }
  .bar button {
    background: var(--panel);
    color: var(--text);
    border: 1px solid rgba(0, 212, 255, 0.28);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s, border-color 0.15s;
  }
  .bar button:hover {
    background: rgba(0, 212, 255, 0.08);
    border-color: var(--cyan);
  }
  .bar button.danger {
    border-color: rgba(255, 64, 129, 0.35);
  }
  .bar button.danger:hover {
    background: rgba(255, 64, 129, 0.08);
    border-color: var(--pink);
  }

  kbd {
    display: inline-block;
    padding: 1px 5px;
    font-family: ui-monospace, monospace;
    font-size: 11px;
    color: var(--cyan);
    background: rgba(0, 212, 255, 0.08);
    border: 1px solid rgba(0, 212, 255, 0.25);
    border-radius: 3px;
  }
</style>
<script type="importmap">
{
  "imports": {
    "three":           "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/":   "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<div id="wrap">
  <div id="hint" class="hud">
    <b>Drag</b> the gizmo on a selected waypoint to move it.<br/>
    <kbd>Click</kbd> a waypoint to select &middot;
    <kbd>Shift + Click</kbd> ground to add &middot;
    <kbd>Del</kbd> to remove<br/>
    <kbd>T</kbd> translate &middot; <kbd>R</kbd> rotate-camera only &middot; <kbd>Esc</kbd> deselect
  </div>
  <div id="status" class="hud">
    Waypoints: <b id="wpCount">0</b> &middot;
    Selected: <b id="wpSel">&mdash;</b>
  </div>
  <div id="axes" class="hud">
    <span class="x">&#9632; East (x)</span> &nbsp;
    <span class="y">&#9632; Up (z)</span> &nbsp;
    <span class="z">&#9632; North (y)</span>
  </div>
  <div class="bar">
    <button id="btnAdd">+ Add</button>
    <button id="btnDup">Duplicate</button>
    <button id="btnDel" class="danger">Delete</button>
    <button id="btnReset" class="danger">Reset</button>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls }     from 'three/addons/controls/OrbitControls.js';
import { TransformControls } from 'three/addons/controls/TransformControls.js';

/* ------------------------------------------------------------------ */
/* Streamlit component protocol (vanilla, no react wrapper)            */
/* ------------------------------------------------------------------ */
const PARENT = window.parent;
function send(type, payload) {
  PARENT.postMessage({ isStreamlitMessage: true, type, ...payload }, '*');
}
function setComponentValue(value) {
  send('streamlit:setComponentValue', { value, dataType: 'json' });
}
function setFrameHeight(h) {
  send('streamlit:setFrameHeight', { height: h });
}

/* ------------------------------------------------------------------ */
/* Coordinate mapping                                                  */
/*   Python ENU:   [x=East, y=North, z=Up]                             */
/*   Three.js:     (x=East,  y=Up,    z=-North)                        */
/*   So map py->three:  (px, pz, -py)                                  */
/*   And three->py:     [tx, -tz, ty]                                  */
/* ------------------------------------------------------------------ */
const pyToThree = ([x, y, z]) => new THREE.Vector3(x, z, -y);
const threeToPy = (v)         => [v.x, -v.z, v.y];

/* ------------------------------------------------------------------ */
/* Scene                                                               */
/* ------------------------------------------------------------------ */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0e1a);
scene.fog = new THREE.Fog(0x0a0e1a, 25, 55);

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
camera.position.set(9, 9, 9);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// Lights
scene.add(new THREE.HemisphereLight(0xaad8ff, 0x0a0e1a, 0.65));
const sun = new THREE.DirectionalLight(0xffffff, 0.55);
sun.position.set(8, 14, 6);
scene.add(sun);

// Ground grid (cyan) — extends well past the default waypoint set
const grid = new THREE.GridHelper(40, 40, 0x00d4ff, 0x223355);
grid.material.opacity = 0.28;
grid.material.transparent = true;
scene.add(grid);

// Axis tri-ad at origin (small, to orient the user)
const axes = new THREE.AxesHelper(1.5);
axes.material.linewidth = 2;
scene.add(axes);

/* ------------------------------------------------------------------ */
/* Camera / transform controls                                         */
/* ------------------------------------------------------------------ */
const orbit = new OrbitControls(camera, renderer.domElement);
orbit.enableDamping = true;
orbit.dampingFactor = 0.08;
orbit.target.set(2.5, 1.5, -2.5);

const transform = new TransformControls(camera, renderer.domElement);
transform.setSize(0.9);
transform.addEventListener('dragging-changed', e => {
  orbit.enabled = !e.value;
  if (!e.value) {
    // drag just finished — commit to Streamlit
    syncPath();
    emit();
  }
});
transform.addEventListener('objectChange', syncPath);
scene.add(transform);

/* ------------------------------------------------------------------ */
/* Waypoints (array of THREE.Mesh)                                     */
/* ------------------------------------------------------------------ */
const waypoints = [];
const SPHERE_GEOM = new THREE.SphereGeometry(0.22, 24, 18);

function makeWaypointMesh(pos, index) {
  const hue = 0.12;  // amber
  const mat = new THREE.MeshStandardMaterial({
    color: 0xffc107,
    emissive: 0x4a3300,
    emissiveIntensity: 0.45,
    roughness: 0.45,
    metalness: 0.1,
  });
  const mesh = new THREE.Mesh(SPHERE_GEOM, mat);
  mesh.position.copy(pos);
  mesh.userData.kind = 'waypoint';
  mesh.userData.index = index;
  scene.add(mesh);
  return mesh;
}

const pillarMat = new THREE.LineDashedMaterial({
  color: 0xffc107, transparent: true, opacity: 0.45,
  dashSize: 0.15, gapSize: 0.12,
});
const pathMat = new THREE.LineDashedMaterial({
  color: 0xffc107, transparent: true, opacity: 0.85,
  dashSize: 0.35, gapSize: 0.18, linewidth: 2,
});
const pathLine   = new THREE.Line(new THREE.BufferGeometry(), pathMat);
const pillarLine = new THREE.Line(new THREE.BufferGeometry(), pillarMat);
scene.add(pathLine);
scene.add(pillarLine);

function syncPath() {
  const pts = waypoints.map(w => w.position.clone());
  pathLine.geometry.setFromPoints(pts);
  pathLine.computeLineDistances();

  const pills = [];
  for (const w of waypoints) {
    pills.push(new THREE.Vector3(w.position.x, 0, w.position.z));
    pills.push(w.position.clone());
  }
  pillarLine.geometry.setFromPoints(pills);
  pillarLine.computeLineDistances();

  updateHudCounts();
}

function updateHudCounts() {
  document.getElementById('wpCount').textContent = waypoints.length;
  const sel = transform.object;
  const idx = sel ? waypoints.indexOf(sel) : -1;
  document.getElementById('wpSel').textContent =
    idx >= 0 ? `WP${idx}` : '—';
}

function clearWaypoints() {
  while (waypoints.length) {
    const m = waypoints.pop();
    scene.remove(m);
    m.material.dispose();
  }
  transform.detach();
}

function addWaypointAt(pos) {
  const m = makeWaypointMesh(pos, waypoints.length);
  waypoints.push(m);
  syncPath();
  return m;
}

function removeWaypoint(mesh) {
  const idx = waypoints.indexOf(mesh);
  if (idx < 0) return;
  transform.detach();
  scene.remove(mesh);
  mesh.material.dispose();
  waypoints.splice(idx, 1);
  syncPath();
  emit();
}

/* ------------------------------------------------------------------ */
/* Emit current waypoint list back to Streamlit                        */
/* ------------------------------------------------------------------ */
let lastSerialized = '';
function emit() {
  const data = waypoints.map(w => threeToPy(w.position).map(n =>
    Math.round(n * 1000) / 1000
  ));
  const s = JSON.stringify(data);
  if (s === lastSerialized) return;
  lastSerialized = s;
  setComponentValue(data);
}

/* ------------------------------------------------------------------ */
/* Picking: click to select, shift-click ground to add                 */
/* ------------------------------------------------------------------ */
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

let pointerDown = null;  // for distinguishing click vs drag

renderer.domElement.addEventListener('pointerdown', e => {
  if (e.button !== 0) return;
  pointerDown = { x: e.clientX, y: e.clientY, shift: e.shiftKey };
});
renderer.domElement.addEventListener('pointerup', e => {
  if (!pointerDown) return;
  const dx = e.clientX - pointerDown.x;
  const dy = e.clientY - pointerDown.y;
  const moved = Math.hypot(dx, dy) > 4;
  const shift = pointerDown.shift;
  pointerDown = null;
  if (moved) return;  // it was an orbit drag, not a click

  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x =  ((e.clientX - rect.left) / rect.width)  * 2 - 1;
  mouse.y = -((e.clientY - rect.top)  / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  const hits = raycaster.intersectObjects(waypoints, false);
  if (hits.length > 0) {
    selectWaypoint(hits[0].object);
    return;
  }

  if (shift) {
    const hit = new THREE.Vector3();
    if (raycaster.ray.intersectPlane(groundPlane, hit)) {
      hit.y = 2.0;                       // default takeoff altitude
      const m = addWaypointAt(hit);
      selectWaypoint(m);
      emit();
    }
    return;
  }

  // plain click on empty space → deselect
  transform.detach();
  updateHudCounts();
});

function selectWaypoint(mesh) {
  transform.attach(mesh);
  transform.setMode('translate');
  updateHudCounts();
}

/* ------------------------------------------------------------------ */
/* Keyboard: T, R, Esc, Delete                                         */
/* ------------------------------------------------------------------ */
window.addEventListener('keydown', e => {
  if (e.key === 'Delete' || e.key === 'Backspace') {
    const sel = transform.object;
    if (sel) { removeWaypoint(sel); }
  } else if (e.key === 't' || e.key === 'T') {
    if (transform.object) transform.setMode('translate');
  } else if (e.key === 'r' || e.key === 'R') {
    transform.detach();
    updateHudCounts();
  } else if (e.key === 'Escape') {
    transform.detach();
    updateHudCounts();
  }
});

/* ------------------------------------------------------------------ */
/* Button bar                                                          */
/* ------------------------------------------------------------------ */
document.getElementById('btnAdd').addEventListener('click', () => {
  const base = waypoints.length
    ? waypoints[waypoints.length - 1].position
    : new THREE.Vector3(0, 2, 0);
  const m = addWaypointAt(new THREE.Vector3(
    base.x + 1.5, base.y, base.z + 1.5
  ));
  selectWaypoint(m);
  emit();
});
document.getElementById('btnDup').addEventListener('click', () => {
  const sel = transform.object;
  if (!sel) return;
  const m = addWaypointAt(new THREE.Vector3(
    sel.position.x + 0.8, sel.position.y, sel.position.z + 0.8
  ));
  selectWaypoint(m);
  emit();
});
document.getElementById('btnDel').addEventListener('click', () => {
  const sel = transform.object;
  if (sel) removeWaypoint(sel);
});
document.getElementById('btnReset').addEventListener('click', () => {
  if (initialWaypoints) loadWaypoints(initialWaypoints, true);
});

/* ------------------------------------------------------------------ */
/* Receive initial args from Streamlit                                 */
/* ------------------------------------------------------------------ */
let initialized = false;
let initialWaypoints = null;

function loadWaypoints(list, emitAfter) {
  clearWaypoints();
  list.forEach(pt => addWaypointAt(pyToThree(pt)));
  if (emitAfter) emit();
}

window.addEventListener('message', event => {
  const d = event.data;
  if (!d || d.type !== 'streamlit:render') return;
  const args = d.args || {};
  if (!initialized) {
    initialized = true;
    initialWaypoints = args.waypoints || [];
    loadWaypoints(initialWaypoints, false);
  }
});

/* ------------------------------------------------------------------ */
/* Resize & animate                                                    */
/* ------------------------------------------------------------------ */
function resize() {
  const w = document.body.clientWidth;
  const h = document.body.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h, false);
}
window.addEventListener('resize', resize);
resize();

function tick() {
  requestAnimationFrame(tick);
  orbit.update();
  renderer.render(scene, camera);
}
tick();

/* ------------------------------------------------------------------ */
/* Tell Streamlit we're ready and set our frame height                 */
/* ------------------------------------------------------------------ */
send('streamlit:componentReady', { apiVersion: 1 });
setFrameHeight(440);
</script>
</body>
</html>
